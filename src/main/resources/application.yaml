server:
  port: 8080
  servlet:
    context-path: /api/v1/digital-store

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/digital_store_db?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Cực kỳ quan trọng: Tự động cập nhật bảng trong DB dựa trên code Java
      ddl-auto: update
    # Hiển thị câu lệnh SQL ra màn hình console để dễ debug thuật toán Gợi ý
    show-sql: true
    properties:
      hibernate:
        format_sql: true

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
